{%- comment -%}
  Anchor links point at the home page so they work from /publications/ and /cv/ too.
{%- endcomment -%}
<header class="nav">
  <div class="nav__inner">
    <a class="nav__brand" href="{{ '/' | relative_url }}">
      <span class="nav__brand-mark" aria-hidden="true"></span>
      {{ site.name }}
    </a>

    <input type="checkbox" id="nav-toggle" class="nav__checkbox" aria-hidden="true">
    <label for="nav-toggle" class="nav__burger" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </label>

    <nav class="nav__links" aria-label="Primary">
      <a href="{{ '/#research' | relative_url }}">Research</a>
      <a href="{{ '/portfolio/' | relative_url }}">Portfolio</a>
      <a href="{{ '/cv/' | relative_url }}">CV</a>
      {%- if site.email and site.email != "" -%}
      <a href="mailto:{{ site.email }}">Contact</a>
      {%- endif -%}
    </nav>
  </div>
</header>
